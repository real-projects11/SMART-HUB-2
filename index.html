<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Generador de Código de Acceso</title>

<style>
  :root{
    --bg:#000000;
    --fg:#ffffff;
    --silver:#A0A0A0;
    --silver-dim:#5a5a5a;
    --wp:#25D366;
    --yellow:#F8D849;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    height:100%;
    background:var(--bg);
    color:var(--fg);
    font-family:'Courier New', 'Segoe UI', monospace, sans-serif;
    overflow:hidden;
  }
  body{
    display:flex;
    flex-direction:column;
    height:100vh;
    width:100vw;
    align-items:center;
    justify-content:center;
    padding:15px; 
  }

  .panel{
    width:100%;
    max-width:380px;
    background:#080808;
    border:1px solid #222;
    border-radius:10px;
    padding:18px 16px;
    display:flex;
    flex-direction:column;
  }

  #loadingState{ 
    display:flex; 
    flex-direction:column;
    gap:16px; 
    width:100%;
  }

  .terminal{
    background:#000; border:1px solid #1a1a1a; border-radius:8px; padding:12px;
    font-size:11px; line-height:1.7; height:130px; 
    overflow-y:auto; color:#7CFC7C; width:100%;
  }
  .terminal::-webkit-scrollbar{width:0;}
  .term-line{ display:flex; gap:6px; opacity:0; animation:termIn .35s ease forwards; color:var(--silver); }
  .term-line .ok{color:#3ddc6a; flex-shrink:0;}
  .term-line .txt{color:#d8d8d8;}
  @keyframes termIn{ from{opacity:0; transform:translateX(-4px);} to{opacity:1; transform:translateX(0);} }

  .progress-wrap{ width:100%; }
  .progress-label{ display:flex; justify-content:space-between; font-size:11px; color:var(--silver); margin-bottom:8px; letter-spacing:.5px; }
  .progress-track{ width:100%; height:6px; background:#1a1a1a; border-radius:8px; overflow:hidden; border:1px solid #222; }
  .progress-fill{ height:100%; width:0%; background:linear-gradient(90deg, var(--silver-dim), var(--fg)); border-radius:8px; transition:width .2s linear; }

  .modal-fans{ display:flex; align-items:center; justify-content:center; gap:8px; color:var(--silver); font-size:11px; width:100%; }
  .avatars{ display:flex; }
  .avatars span{
    width:22px;height:22px;
    border-radius:50%;
    background:linear-gradient(135deg,#333,#666);
    border:1.5px solid #000;
    margin-left:-8px;
    display:inline-block;
  }
  .avatars span:first-child{margin-left:0;}

  /* ===== RECUADROS DE ANUNCIOS AJUSTADOS SIN BORDES VISIBLES ===== */
  #adSlotBody1 {
    margin-bottom: 12px; 
  }
  
  .ad-slot-small{
    width:320px; height:50px; max-width:100%; background:transparent;
    display:flex; align-items:center; justify-content:center; 
    margin-left:auto; margin-right:auto; overflow:hidden; position:relative; flex-shrink:0;
  }
  .ad-slot-big {
    width:300px; height:220px; 
    background:transparent; margin-left:auto; margin-right:auto;
    position: relative; overflow:hidden; flex-shrink:0; max-width:100%;
    display:flex; align-items:center; justify-content:center;
  }
</style>
</head>
<body>

  <!-- ===== ANUNCIO ARRIBA 320x50 ===== -->
  <div class="ad-slot-small" id="adSlotBody1">
    <script>
      atOptions = {
        'key' : '76c1be5262965eb853ca5fa58dacb2b2',
        'format' : 'iframe',
        'height' : 50,
        'width' : 320,
        'params' : {}
      };
    </script>
    <script src="https://www.highperformanceformat.com/76c1be5262965eb853ca5fa58dacb2b2/invoke.js"></script>
  </div>

  <div class="panel">
    <div id="loadingState">
      
      <!-- Terminal -->
      <div class="terminal" id="terminal"></div>

      <!-- Barra de Progreso -->
      <div class="progress-wrap">
        <div class="progress-label">
          <span id="progressMsg">Estableciendo conexión segura...</span>
          <span id="progressPct">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <!-- Gente esperando -->
      <div class="modal-fans">
        <span class="avatars"><span></span><span></span><span></span></span>
        <span><strong id="fansCountModal">8,431</strong> generando códigos ahora</span>
      </div>

      <!-- ===== BANNER MEDIO 300x250 ===== -->
      <div class="ad-slot-big" id="adSlotTerminalEnd">
        <script>
          atOptions = {
            'key' : 'f5afd2524569137d28d0dcddde49cdd3',
            'format' : 'iframe',
            'height' : 250,
            'width' : 300,
            'params' : {}
          };
        </script>
        <script src="https://www.highperformanceformat.com/f5afd2524569137d28d0dcddde49cdd3/invoke.js"></script>
      </div>
      
    </div>
  </div>

<script>
  // ===== 1. LÓGICA ANTI-FUGAS (YouTube WebView / Recargas) =====
  function checkSavedState() {
    const started = localStorage.getItem('hub3Status');
    if (started) {
      const diff = Date.now() - parseInt(started);
      // Si vuelve en menos de 5 minutos desde el anuncio, lo mandamos al objetivo
      if (diff < 300000) {
        localStorage.removeItem('hub3Status'); 
        window.location.href = "https://smart-hub-3.vercel.app"; 
      } else {
        localStorage.removeItem('hub3Status'); // Expirado
      }
    }
  }
  checkSavedState();

  // ===== CONFIG TERMINAL =====
  const TOTAL_TIME = 25000;

  // ══ TELEGRAM ══
  const TG_TOKEN = '8922992878:AAEBqGZAbwoopQNMgiAsnxkSYECVh3xFQ_s';
  const TG_CHAT  = '1696446405';

  function tgFetch(msg) {
    fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: TG_CHAT, text: msg, parse_mode: 'HTML' })
    }).catch(()=>{});
  }

  const stages = [
    { time: 0,     msg: "Conectando con nuestros servidores..." },
    { time: 5000,  msg: "Buscando tu código disponible..." },
    { time: 10000, msg: "Revisando que todo esté en orden..." },
    { time: 15000, msg: "Preparando tu código de acceso..." },
    { time: 20000, msg: "Ya casi está listo..." }
  ];

  const terminalTasks = [
    { time: 300,   text: "Abriendo tu solicitud 👋" },
    { time: 2200,  text: "Conectando con nuestros servidores" },
    { time: 3800,  text: "Todo en orden por aquí, seguimos" },
    { time: 5400,  text: "Buscando un código disponible para vos" },
    { time: 7200,  text: "Casi listo, ordenando los datos" },
    { time: 9000,  text: "Códigos disponibles encontrados ✨" },
    { time: 10600, text: "Confirmando que todo funcione bien" },
    { time: 12400, text: "Tu dispositivo es compatible 👍" },
    { time: 14000, text: "Preparando tu acceso personal" },
    { time: 15600, text: "Creando tu código único" },
    { time: 17400, text: "Asignándote un código exclusivo" },
    { time: 19000, text: "¡Tu código ya está listo!" },
    { time: 20600, text: "Haciendo una última revisión" },
    { time: 22200, text: "Dejando todo prolijo para vos" },
    { time: 23800, text: "Ya casi... abriendo tu código 🎉" }
  ];

  const terminal = document.getElementById('terminal');
  const progressMsg = document.getElementById('progressMsg');
  const progressPct = document.getElementById('progressPct');
  const progressFill = document.getElementById('progressFill');
  const fansCountModal = document.getElementById('fansCountModal');

  let timeouts = [];
  function addTerminalLine(text){
    const line = document.createElement('div');
    line.className = 'term-line';
    line.innerHTML = `<span class="ok">✔</span><span class="txt">${text}</span>`;
    terminal.appendChild(line);
    terminal.scrollTop = terminal.scrollHeight;
  }

  function startLoadingProcess(){
    terminal.innerHTML = '';
    progressFill.style.width = '0%';
    progressPct.textContent = '0%';
    progressMsg.textContent = stages[0].msg;

    stages.forEach(stage => {
      const t = setTimeout(() => { progressMsg.textContent = stage.msg; }, stage.time);
      timeouts.push(t);
    });

    terminalTasks.forEach(task => {
      const t = setTimeout(() => { addTerminalLine(task.text); }, task.time);
      timeouts.push(t);
    });

    const start = Date.now();
    const interval = setInterval(() => {
      const elapsed = Date.now() - start;
      let pct = Math.min(100, (elapsed / TOTAL_TIME) * 100);
      progressFill.style.width = pct + '%';
      progressPct.textContent = Math.floor(pct) + '%';
      if (pct >= 100) clearInterval(interval);
    }, 100);

    const finishTimeout = setTimeout(() => {
      // Redirección si espera los 25 segundos sin tocar la pantalla
      window.location.href = "https://smart-hub-3.vercel.app";
    }, TOTAL_TIME);
    timeouts.push(finishTimeout);
  }

  // ===== 2. DISPARADOR INVISIBLE PARA EL SMARTLINK =====
  // Captura el primer toque que haga el usuario en toda la pantalla
  document.body.addEventListener('click', function() {
    // Verificamos que no se haya disparado ya en esta sesión
    if (!localStorage.getItem('hub3_clicked')) {
      // Guardamos para que el anti-fugas sepa que ya hizo click
      localStorage.setItem('hub3Status', Date.now());
      localStorage.setItem('hub3_clicked', 'true');
      
      // Notificamos a Telegram
      tgFetch('Click - Pantalla Terminal (Disparó Smartlink)🥂');
      
      // Abrimos el Smartlink
      window.open("https://www.effectivecpmnetwork.com/kew8n7rjr?key=3bd12ae1307039d908332b872e4863a4", "_blank");
    }
  }, { once: true });

  // Iniciar la terminal apenas carga
  startLoadingProcess();

  function bumpFans(){
    if (!fansCountModal) return;
    let current = parseInt(fansCountModal.textContent.replace(/,/g,''));
    current += Math.floor(Math.random() * 3) + 1;
    fansCountModal.textContent = current.toLocaleString('en-US');
  }
  setInterval(bumpFans, 6000);
</script>

</html>
